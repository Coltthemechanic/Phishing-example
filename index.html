<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>Email Poll</title>

    <link rel="stylesheet" href="styles.css">
    
</head>
<body>
    
    <header>

        <h1>Email Poll</h1>
    </header>

    <main>
        <p>Please input your email address and answer to the poll in the fields below:</p>

        <input type="email" id="email" placeholder="Enter your email address" required><br>
        
       <input type="radio" id="option1" name="poll" value="Option 1">
       <label for="option1">email 1</label><br>
       <input type="radio" id="option2" name="poll" value="Option 2">
         <label for="option2">email 2</label><br>

        <button id="submit" onclick="window.location.href='https://youtu.be/Aq5WXmQQooo?si=Ox7XvYUvDK0FyCdK'">Submit</button>

        <div id="tapzone"></div>

       <div id="videowrap">

            <div id="player"></div>
            
        </div>
        

    </main>
    
    <!-- <script src="script.js"></script> -->

</body>
</html>
